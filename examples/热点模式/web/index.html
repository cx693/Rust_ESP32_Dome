<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 热点控制面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #00d4ff;
            text-align: center;
        }

        .card {
            background: #16213e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .card h2 {
            font-size: 1.1em;
            margin-bottom: 16px;
            color: #a8a8a8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            display: inline-block;
            background: #00d4ff;
            color: #1a1a2e;
            font-size: 0.8em;
            font-weight: bold;
            padding: 2px 10px;
            border-radius: 12px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .info-item {
            text-align: center;
        }

        .info-item .label {
            display: block;
            font-size: 0.8em;
            color: #666;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-item .value {
            display: block;
            font-size: 1.15em;
            font-weight: bold;
            color: #00d4ff;
            font-family: 'Courier New', monospace;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 10px 8px;
            text-align: left;
            color: #00d4ff;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #2a2a4e;
        }

        tbody td {
            padding: 10px 8px;
            font-size: 0.9em;
            font-family: 'Courier New', monospace;
            border-bottom: 1px solid #1e1e3a;
        }

        tbody tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        .empty-row td {
            text-align: center;
            color: #555;
            padding: 28px 8px;
            font-family: 'Segoe UI', sans-serif;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }

        .dot-online {
            background: #00ff88;
            box-shadow: 0 0 6px #00ff88;
        }

        .footer {
            text-align: center;
            color: #444;
            font-size: 0.8em;
            margin-top: 8px;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 500px) {
            .info-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            thead th, tbody td {
                padding: 8px 4px;
                font-size: 0.78em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ESP32 热点控制面板</h1>

        <div class="card">
            <h2>热点信息</h2>
            <div class="info-grid">
                <div class="info-item">
                    <span class="label">SSID</span>
                    <span id="ap-ssid" class="value">--</span>
                </div>
                <div class="info-item">
                    <span class="label">IP 地址</span>
                    <span id="ap-ip" class="value">--</span>
                </div>
                <div class="info-item">
                    <span class="label">网关</span>
                    <span id="ap-gw" class="value">--</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>已连接设备 <span id="client-count" class="badge">0</span></h2>
            <table>
                <thead>
                    <tr>
                        <th>MAC 地址</th>
                        <th>IP 地址</th>
                        <th>主机名</th>
                        <th>在线</th>
                    </tr>
                </thead>
                <tbody id="client-list">
                    <tr class="empty-row"><td colspan="4">暂无设备连接</td></tr>
                </tbody>
            </table>
        </div>

        <p class="footer"><span class="status-dot dot-online pulse"></span> 自动刷新 · 每 2 秒</p>
    </div>

    <script>
        function formatUptime(sec) {
            if (sec < 60) return sec + 's';
            var m = Math.floor(sec / 60);
            var s = sec % 60;
            if (m < 60) return m + 'm ' + s + 's';
            var h = Math.floor(m / 60);
            m = m % 60;
            return h + 'h ' + m + 'm';
        }

        function fetchData() {
            fetch('/api/clients')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    document.getElementById('ap-ssid').textContent = data.ssid || '--';
                    document.getElementById('ap-ip').textContent = data.ip || '--';
                    document.getElementById('ap-gw').textContent = data.gateway || '--';

                    var clients = data.clients || [];
                    document.getElementById('client-count').textContent = clients.length;

                    var tbody = document.getElementById('client-list');
                    if (clients.length === 0) {
                        tbody.innerHTML = '<tr class="empty-row"><td colspan="4">暂无设备连接</td></tr>';
                        return;
                    }
                    var html = '';
                    for (var i = 0; i < clients.length; i++) {
                        var c = clients[i];
                        html += '<tr>';
                        html += '<td>' + c.mac + '</td>';
                        html += '<td>' + c.ip + '</td>';
                        html += '<td>' + (c.hostname && c.hostname.length > 0 ? c.hostname : '-') + '</td>';
                        html += '<td>' + formatUptime(c.uptime) + '</td>';
                        html += '</tr>';
                    }
                    tbody.innerHTML = html;
                })
                .catch(function() {});
        }

        fetchData();
        setInterval(fetchData, 2000);
    </script>
</body>
</html>
